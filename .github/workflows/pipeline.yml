name: CI/CD Pipeline with Automated Versioning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '9.0.x'
  REGISTRY: ghcr.io
  VERSION_FILE: SyncApp26/VERSION

jobs:
  version-bump:
    name: Version Bump & Update
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
      version_updated: ${{ steps.bump_version.outputs.version_updated }}
      tag_needed: ${{ steps.bump_version.outputs.tag_needed }}
    permissions:
      contents: write
      pull-requests: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Analyze commits and bump version
      id: bump_version
      run: |
        # Read current version from VERSION file
        CURRENT_VERSION=$(cat ${{ env.VERSION_FILE }})
        echo "Current version: $CURRENT_VERSION"
        
        # Check if we need to tag (Version in file > Last Tag)
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Last tag: $LAST_TAG"
        
        if [ "v$CURRENT_VERSION" != "$LAST_TAG" ] && [ "$LAST_TAG" != "v0.0.0" ]; then
           # Check if v$CURRENT_VERSION is technically newer or just different? 
           # Simplest: If they differ and we are on main, assume we just merged a release.
           echo "Version $CURRENT_VERSION differs from $LAST_TAG. Assuming merge complete. Tagging needed."
           echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
           echo "version_updated=false" >> $GITHUB_OUTPUT
           echo "tag_needed=true" >> $GITHUB_OUTPUT
           exit 0
        fi
        
        # If no last tag exists at all (first run), we might want to tag current or analyze history.
        # Assuming if v0.0.0 (fallback), and we have commits, we proceed to bump.
        echo "Current version: $CURRENT_VERSION"
        
        # Parse version components
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        
        # Get commit messages since last tag (or all if no tags)
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --format=%s)
        else
          COMMITS=$(git log ${LAST_TAG}..HEAD --format=%s)
        fi
        
        echo "Analyzing commits:"
        echo "$COMMITS"
        
        # Determine version bump type based on conventional commits
        BUMP_TYPE="none"
        
        # Check for BREAKING CHANGE or ! in commit type (major version)
        if echo "$COMMITS" | grep -qE "^(feat|fix|chore|docs|style|refactor|perf|test)(\(.+\))?!:|BREAKING CHANGE:"; then
          BUMP_TYPE="major"
          echo "Found breaking change - will bump MAJOR version"
        # Check for feat: (minor version)
        elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
          BUMP_TYPE="minor"
          echo "Found feature - will bump MINOR version"
        # Check for fix: (patch version)
        elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
          BUMP_TYPE="patch"
          echo "Found fix - will bump PATCH version"
        # Check for other conventional commits (patch version)
        elif echo "$COMMITS" | grep -qE "^(chore|docs|style|refactor|perf|test)(\(.+\))?:"; then
          BUMP_TYPE="patch"
          echo "Found other conventional commit - will bump PATCH version"
        fi
        
        # Apply version bump
        case $BUMP_TYPE in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            VERSION_UPDATED="true"
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            VERSION_UPDATED="true"
            ;;
          patch)
            PATCH=$((PATCH + 1))
            VERSION_UPDATED="true"
            ;;
          *)
            echo "No conventional commits found - version unchanged"
            VERSION_UPDATED="false"
            ;;
        esac
        
        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        
        echo "New version: $NEW_VERSION"
        echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "version_updated=${VERSION_UPDATED}" >> $GITHUB_OUTPUT
        
        # Update VERSION file if version changed
        if [ "$VERSION_UPDATED" == "true" ]; then
          echo "$NEW_VERSION" > ${{ env.VERSION_FILE }}
          echo "VERSION file updated"
        fi
        
        echo "tag_needed=false" >> $GITHUB_OUTPUT
      
    - name: Create Pull Request for Version Bump
      if: steps.bump_version.outputs.version_updated == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        NEW_VERSION="${{ steps.bump_version.outputs.new_version }}"
        BRANCH_NAME="release/v$NEW_VERSION"
        
        echo "Creating release branch: $BRANCH_NAME"
        git checkout -b $BRANCH_NAME
        
        git add ${{ env.VERSION_FILE }}
        git commit -m "chore: bump version to $NEW_VERSION"
        
        git push origin $BRANCH_NAME
        
        echo "Creating Pull Request..."
        gh pr create \
          --title "chore: Release v$NEW_VERSION" \
          --body "Automated version bump to $NEW_VERSION. Please review and squash/merge." \
          --base main \
          --head $BRANCH_NAME
      
    - name: Create Git Tag
      if: steps.bump_version.outputs.tag_needed == 'true'
      run: |
        git tag "v${{ steps.bump_version.outputs.new_version }}"
        git push origin "v${{ steps.bump_version.outputs.new_version }}"
        echo "Created and pushed tag v${{ steps.bump_version.outputs.new_version }}"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always() && !cancelled()
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
      
    - name: Get current version
      id: get_version
      run: |
        VERSION=$(cat ${{ env.VERSION_FILE }})
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Using version: ${VERSION}"
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
        
    - name: Restore dependencies
      run: dotnet restore SyncApp26/SyncApp26.sln
      
    - name: Update version in project files
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        echo "Updating version to: $VERSION"
        
        # Update SyncApp26.API.csproj - all version fields use x.y.z format
        sed -i "s|<Version>.*</Version>|<Version>$VERSION</Version>|g" SyncApp26/SyncApp26.API/SyncApp26.API.csproj
        sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>$VERSION</AssemblyVersion>|g" SyncApp26/SyncApp26.API/SyncApp26.API.csproj
        sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>$VERSION</FileVersion>|g" SyncApp26/SyncApp26.API/SyncApp26.API.csproj
        sed -i "s|<InformationalVersion>.*</InformationalVersion>|<InformationalVersion>$VERSION</InformationalVersion>|g" SyncApp26/SyncApp26.API/SyncApp26.API.csproj
        
        echo "Version updated in project files"
    
    - name: Build solution
      run: |
        dotnet build SyncApp26/SyncApp26.sln \
          --no-restore \
          --configuration Release \
          /p:Version="${{ steps.get_version.outputs.version }}"

    - name: Run tests
      run: |
        dotnet test SyncApp26/SyncApp26.sln \
          --no-build \
          --configuration Release \
          --verbosity minimal