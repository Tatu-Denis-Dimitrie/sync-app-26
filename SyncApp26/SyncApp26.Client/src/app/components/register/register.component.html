<div class="register-container">
	<div class="register-card">
		<div class="register-header">
			<h1 class="register-title">SyncApp26</h1>
			<p class="register-subtitle">Create your account</p>
		</div>

		<form class="register-form" (ngSubmit)="onRegister()">
			<div class="form-group">
				<label for="firstName" class="form-label">First Name</label>
				<input
					type="text"
					id="firstName"
					name="firstName"
					[(ngModel)]="firstName"
					(keypress)="onKeyPress($event)"
					class="form-input"
					placeholder="Enter your first name"
					autocomplete="given-name"
				/>
			</div>

			<div class="form-group">
				<label for="lastName" class="form-label">Last Name</label>
				<input
					type="text"
					id="lastName"
					name="lastName"
					[(ngModel)]="lastName"
					(keypress)="onKeyPress($event)"
					class="form-input"
					placeholder="Enter your last name"
					autocomplete="family-name"
				/>
			</div>

			<div class="form-group">
				<label for="email" class="form-label">Email</label>
				<input
					type="email"
					id="email"
					name="email"
					[(ngModel)]="email"
					(keypress)="onKeyPress($event)"
					class="form-input"
					placeholder="Enter your email"
					autocomplete="email"
				/>
			</div>

			<div class="form-group">
				<label for="password" class="form-label">Password</label>
				<input
					type="password"
					id="password"
					name="password"
					[(ngModel)]="password"
					(keypress)="onKeyPress($event)"
					class="form-input"
					placeholder="Enter your password"
					autocomplete="new-password"
				/>
			</div>

			<div class="form-group">
				<label for="confirmPassword" class="form-label">Confirm Password</label>
				<input
					type="password"
					id="confirmPassword"
					name="confirmPassword"
					[(ngModel)]="confirmPassword"
					(keypress)="onKeyPress($event)"
					class="form-input"
					placeholder="Confirm your password"
					autocomplete="new-password"
				/>
			</div>

			<div *ngIf="errorMessage" class="error-message">
				{{ errorMessage }}
			</div>

			<button type="submit" class="register-button">Register</button>
		</form>

		<div class="register-footer">
			<p class="footer-text">SyncApp26 - User Management System</p>
      <p class="footer-link">
        Already have an account? <a routerLink="/login" class="link">Sign in here</a>
      </p>
</div>
