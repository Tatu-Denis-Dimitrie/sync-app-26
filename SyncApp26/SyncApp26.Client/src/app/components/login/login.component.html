<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">SyncApp26</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          (keypress)="onKeyPress($event)"
          class="form-input"
          placeholder="Enter your email"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          (keypress)="onKeyPress($event)"
          class="form-input"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div class="forgot-password-link">
        <a routerLink="/forgot-password" class="link">Forgot Password?</a>
      </div>

      <button type="submit" class="login-button" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>
    </form>

    <div class="login-footer">
      <p class="footer-text">SyncApp26 - User Management System</p>
      <p class="footer-link">
        Don't have an account? <a routerLink="/register" class="link">Register here</a>
      </p>
    </div>
  </div>
</div>
