<div *ngIf="isVisible" class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Add Bulk Periodic Training</h2>
      <button class="close-button" (click)="closeModal()" aria-label="Close">
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="modal-description">
        Add periodic training records with the same data for users in a selected
        department. This will create a new training entry in each user's
        <select
          [(ngModel)]="formData.documentType"
          name="documentType"
          class="inline-dropdown"
        >
          <option value="Both">SSM & SU</option>
          <option value="SSM">SSM</option>
          <option value="SU">SU</option>
        </select>
        document.
      </p>

      <form class="training-form">
        <div class="form-row">
          <div class="form-group">
            <label for="trainingDate" class="form-label">
              Training Date <span class="required">*</span>
            </label>
            <input
              type="date"
              id="trainingDate"
              [(ngModel)]="formData.trainingDate"
              name="trainingDate"
              class="form-input"
              required
            />
          </div>

          <div class="form-group">
            <label for="durationHours" class="form-label">
              Duration (hours)
            </label>
            <input
              type="number"
              id="durationHours"
              [(ngModel)]="formData.durationHours"
              name="durationHours"
              class="form-input"
              min="0"
              step="0.5"
              placeholder="e.g., 2.5"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="department" class="form-label"> Department </label>
          <select
            id="department"
            [(ngModel)]="formData.selectedDepartmentId"
            name="selectedDepartmentId"
            class="form-input"
            [disabled]="isLoadingDepartments"
          >
            <option [ngValue]="null">
              {{
                isLoadingDepartments
                  ? "Loading departments..."
                  : "All users (all departments)"
              }}
            </option>
            <option
              *ngFor="let department of departments"
              [ngValue]="department.id"
            >
              {{ department.name }}
            </option>
          </select>
          <p class="form-hint">
            Leave on "All users" to apply globally, or choose one department to
            target only that team.
          </p>
        </div>

        <div class="form-group">
          <label for="materialTaught" class="form-label">
            Material Taught
          </label>
          <textarea
            id="materialTaught"
            [(ngModel)]="formData.materialTaught"
            name="materialTaught"
            class="form-textarea"
            rows="3"
            placeholder="Enter the training material covered..."
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="instructorName" class="form-label">
              Instructor Name
            </label>
            <input
              type="text"
              id="instructorName"
              [(ngModel)]="formData.instructorName"
              name="instructorName"
              class="form-input"
              placeholder="Name of the instructor"
            />
          </div>

          <div class="form-group" *ngIf="formData.documentType !== 'SU'">
            <label for="verifierName" class="form-label">
              Verifier Name (SSM only)
            </label>
            <input
              type="text"
              id="verifierName"
              [(ngModel)]="formData.verifierName"
              name="verifierName"
              class="form-input"
              placeholder="Name of the verifier"
            />
          </div>
        </div>

        <div class="form-group-checkbox">
          <input
            type="checkbox"
            id="applyToAllUsers"
            [(ngModel)]="formData.applyToAllUsers"
            name="applyToAllUsers"
            class="form-checkbox"
          />
          <label for="applyToAllUsers" class="checkbox-label">
            Apply to all active users
          </label>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button
        type="button"
        class="btn-secondary"
        (click)="closeModal()"
        [disabled]="isSubmitting"
      >
        Cancel
      </button>
      <button
        type="button"
        class="btn-primary"
        (click)="submitBulkTraining()"
        [disabled]="
          isSubmitting || !formData.trainingDate || isLoadingDepartments
        "
      >
        {{ isSubmitting ? "Adding..." : "Add Training Records" }}
      </button>
    </div>
  </div>
</div>
