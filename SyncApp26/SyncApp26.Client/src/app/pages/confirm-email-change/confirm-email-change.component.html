<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-slate-200 text-center">

    @if (isVerifying) {
      <div class="flex flex-col items-center">
        <svg class="animate-spin h-10 w-10 text-teal-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        <h2 class="text-2xl font-bold text-slate-800">Verifying Email...</h2>
        <p class="mt-2 text-sm text-slate-500">Please wait while we confirm your email address.</p>
      </div>
    }

    @if (!isVerifying && successMessage) {
      <div class="flex flex-col items-center">
        <div class="h-16 w-16 bg-teal-100 rounded-full flex items-center justify-center mb-4">
          <svg class="h-8 w-8 text-teal-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Email Verified!</h2>
        <p class="mt-2 text-sm text-slate-500">{{ successMessage }}</p>
        <button (click)="goToDashboard()" class="mt-8 w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
          Return to Dashboard
        </button>
      </div>
    }

    @if (!isVerifying && errorMessage) {
      <div class="flex flex-col items-center">
        <div class="h-16 w-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
          <svg class="h-8 w-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Verification Failed</h2>
        <p class="mt-2 text-sm text-slate-500">{{ errorMessage }}</p>
        <button (click)="goToDashboard()" class="mt-8 w-full flex justify-center py-2 px-4 border border-slate-300 rounded-md shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
          Return to Dashboard
        </button>
      </div>
    }

  </div>
</div>
