<header
    class="border-b border-border bg-card/50 backdrop-blur-sm sticky top-0 z-40"
  >
    <div class="container mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-3">
          <div
            class="w-8 h-8 bg-primary rounded-md flex items-center justify-center"
          >
            <svg
              class="w-5 h-5 text-primary-foreground"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
              ></path>
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-semibold text-foreground">SyncApp 26</h1>
            <p class="text-sm text-muted-foreground">
              Synchronize employee data with CSV import
            </p>
          </div>
        </div>
        <div class="flex gap-2">
          <button
            (click)="navigateToDepartments()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors"
          >
            Departments
          </button>
          <button
            (click)="navigateToImportHistory()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors"
          >
            User History
          </button>
          <button
            (click)="navigateToUsers()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors"
          >
            Users
          </button>
          <button
            (click)="navigateToEmployees()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors"
          >
            Employees
          </button>
          <button
            (click)="navigateToDocuments()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors"
          >
            Documents
          </button>
          <button
            (click)="navigateToSignature()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-white bg-gray-500"
          >
            Signature
          </button>
          <button (click)="navigateToDataRequests()" class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors">
            Data Requests
          </button>
          <button
            (click)="logout()"
            class="px-4 py-2 border border-border rounded-md text-sm font-medium text-foreground bg-background hover:bg-accent transition-colors"
          >
            Logout
          </button>
        </div>
      </div>
    </div>
  </header>

<div class="flex flex-col min-h-screen">
  <div class="flex-1 flex justify-center items-center">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-primary">Admin Signature</h2>

    <!-- Preview semnătură salvată -->
    <div *ngIf="savedSignature && savedSignature.isActive" class="mb-6 p-4 bg-teal-50 border border-teal-200 rounded-lg">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
          <p class="text-xs font-semibold text-teal-700 uppercase tracking-wide mb-2">Saved Signature</p>
          <div class="bg-white border border-teal-200 rounded-md p-3 inline-block">
            <img [src]="savedSignature.signatureData" alt="Your saved signature"
              class="max-h-16 max-w-xs object-contain" />
          </div>
          <p class="text-xs text-teal-600 mt-2">
            Saved {{ savedSignature.createdAt | date:'short' }} &nbsp;·&nbsp;
            Method: {{ savedSignature.signatureMethod }}
          </p>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-border mb-4">
      <button (click)="setSignatureMethod('draw')"
        [class.border-b-2]="signatureMethod === 'draw'"
        [class.border-teal-600]="signatureMethod === 'draw'"
        [class.text-teal-700]="signatureMethod === 'draw'"
        [class.font-semibold]="signatureMethod === 'draw'"
        class="px-5 py-3 text-sm transition text-muted-foreground hover:text-foreground">
        Desenează
      </button>
      <button (click)="setSignatureMethod('type')"
        [class.border-b-2]="signatureMethod === 'type'"
        [class.border-teal-600]="signatureMethod === 'type'"
        [class.text-teal-700]="signatureMethod === 'type'"
        [class.font-semibold]="signatureMethod === 'type'"
        class="px-5 py-3 text-sm transition text-muted-foreground hover:text-foreground">
        Tastează
      </button>
    </div>

    <div class="p-5 space-y-4">
      <!-- Draw pad -->
      <div *ngIf="signatureMethod === 'draw'">
        <p class="text-xs text-muted-foreground mb-2">Draw your signature below using the mouse or touch.</p>
        <div class="relative border border-border rounded-lg bg-white overflow-hidden w-full" style="height:120px">
          <canvas #signaturePad width="600" height="120"
            class="absolute inset-0 w-full h-full cursor-crosshair touch-none"
            (mousedown)="startDrawing($event)"
            (mousemove)="draw($event)"
            (mouseup)="stopDrawing()"
            (mouseleave)="stopDrawing()"
            (touchstart)="startDrawing($event)"
            (touchmove)="draw($event)"
            (touchend)="stopDrawing()"
            (touchcancel)="stopDrawing()">
          </canvas>
        </div>
        <button (click)="clearSignature()" class="mt-2 text-xs text-muted-foreground hover:text-foreground underline">
          Clear
        </button>
      </div>

      <!-- Type pad -->
      <div *ngIf="signatureMethod === 'type'">
        <p class="text-xs text-muted-foreground mb-2">Type your full name as a legal signature.</p>
        <input [(ngModel)]="typedSignature" (input)="onTypedSignatureChange()" type="text" maxlength="64" placeholder="Full Name"
          class="w-full px-4 py-3 border border-border rounded-lg text-2xl bg-white focus:outline-none focus:ring-2 focus:ring-teal-500"
          style="font-family: 'Dancing Script', 'Brush Script MT', cursive;" />
      </div>

      <!-- Confirm checkbox -->
      <label class="flex items-start gap-3 cursor-pointer select-none">
        <input type="checkbox" [(ngModel)]="isSigConfirmed"
          class="mt-0.5 h-4 w-4 rounded border-border text-teal-600 focus:ring-teal-500" />
        <span class="text-sm text-muted-foreground">
          Confirm that this is my signature and I authorize its use on documents.
        </span>
      </label>

      <!-- Save button -->
      <div class="flex justify-center">
        <button (click)="saveSignature()" [disabled]="!isSigConfirmed"
          class="px-6 py-2 bg-primary text-white rounded font-semibold hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
          Save
        </button>
      </div>
    </div>
    </div>
  </div>
</div>
